Global:
  device: gpu
  epoch_num: 25
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./
  save_epoch_step: 1
  eval_batch_step:
  - 0
  - 500
  eval_epoch_step:
  - 0
  - 1
  cal_metric_during_train: true
  pretrained_model: null
  checkpoints: null
  use_tensorboard: false
  infer_img: null
  character_dict_path: ./tools/utils/EN_symbol_dict.txt
  max_text_length: 25
  use_space_char: false
  save_res_path: ./output/rec/u14m_filter/predicts_svtr_base_nrtr.txt
  use_amp: true
  distributed: false
Optimizer:
  name: AdamW
  lr: 0.00032
  weight_decay: 0.05
  filter_bias_and_bn: true
LRScheduler:
  name: OneCycleLR
  warmup_epoch: 1.5
  cycle_momentum: false
Architecture:
  model_type: rec
  algorithm: NRTR
  in_channels: 3
  Transform: null
  Encoder:
    name: SVTRNet
    img_size:
    - 32
    - 128
    out_char_num: 25
    out_channels: 256
    patch_merging: Conv
    embed_dim:
    - 128
    - 256
    - 384
    depth:
    - 3
    - 6
    - 9
    num_heads:
    - 4
    - 8
    - 12
    mixer:
    - Conv
    - Conv
    - Conv
    - Conv
    - Conv
    - Conv
    - Conv
    - Conv
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    local_mixer:
    - - 5
      - 5
    - - 5
      - 5
    - - 5
      - 5
    last_stage: false
    sub_k:
    - - 1
      - 1
    - - 2
      - 1
    prenorm: true
  Decoder:
    name: O2SDecoder
    num_encoder_layers: -1
    beam_size: 0
    num_decoder_layers: 4
    nhead: 12
    max_len: 25
Loss:
  name: ARLoss
PostProcess:
  name: ARLabelDecode
  character_dict_path: ./tools/utils/EN_symbol_dict.txt
  use_space_char: false
Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: true
Train:
  dataset:
    name: LMDBDataSet
    data_dir: /home/imuse/mazhibin/AdvancedLiterateMachinery/OCR/LISTER/Union14M-L-Filtered
    transforms:
    - DecodeImagePIL:
        img_mode: RGB
    - PARSeqAugPIL: null
    - ARLabelEncode:
        character_dict_path: ./tools/utils/EN_symbol_dict.txt
        use_space_char: false
        max_text_length: 25
    - RecTVResize:
        image_shape:
        - 32
        - 128
        padding: false
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: true
    batch_size_per_card: 1024
    drop_last: true
    num_workers: 4
Eval:
  dataset:
    name: LMDBDataSet
    data_dir: /mnt/nfs/mzb_WorkSpace/Recognition/test/IIIT5k
    transforms:
    - DecodeImagePIL:
        img_mode: RGB
    - ARLabelEncode:
        character_dict_path: ./tools/utils/EN_symbol_dict.txt
        use_space_char: false
        max_text_length: 25
    - RecTVResize:
        image_shape:
        - 32
        - 128
        padding: false
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 256
    num_workers: 2
filename: svtr-b_o2s
config: /home/imuse/mazhibin/AdvancedLiterateMachinery/OCR/One2Seq/configs/rec/one2seq/svtr-b_o2s.yml
local_rank: null
eval: true
